<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 健身教練 App 儀表板</title>
    <style>
        :root {
            --sidebar-width: 260px;
            --primary-color: #ff4b4b; /* Streamlit 經典紅 */
            --bg-color: #ffffff;
            --sidebar-bg: #f0f2f6;
        }
        body { margin: 0; font-family: "Source Sans Pro", sans-serif; display: flex; height: 100vh; overflow: hidden; }
        
        /* 側邊欄 */
        .sidebar {
            width: var(--sidebar-width);
            background-color: var(--sidebar-bg);
            padding: 20px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #e6e9ef;
        }
        .sidebar h2 { font-size: 1.2rem; color: #31333f; margin-bottom: 30px; }
        .nav-item { padding: 10px; margin: 5px 0; color: #31333f; text-decoration: none; border-radius: 5px; transition: 0.2s; }
        .nav-item:hover { background: #e6e9ef; }

        /* 主要內容區 */
        .main-content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            background-color: var(--bg-color);
            text-align: left;
        }
        .st-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #e6e9ef;
            margin-bottom: 20px;
        }
        .st-header {
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 10px;
            margin-bottom: 30px;
        }
        .btn-streamlit {
            background-color: var(--primary-color);
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            display: inline-block;
            margin-top: 20px;
        }
        .btn-streamlit:hover { opacity: 0.8; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>AI 健身教練導覽</h2>
        <a href="#" class="nav-item">🏠 專案首頁</a>
        <a href="#" class="nav-item">📊 數據分析</a>
        <a href="#" class="nav-item">👥 團隊成員</a>
        <div style="margin-top: auto; font-size: 0.8rem; color: #888;">
            Built with GitHub Pages <br>
            CSIE Project 2026
        </div>
    </div>

    <div class="main-content">
        <div class="st-header">
            <h1>🏋️ AI 驅動的個人化健身教練系統</h1>
            <p>靜宜大學資工系 專題實作</p>
        </div>

        <div class="st-card">
            <h3>🚀 系統核心功能</h3>
            <p>本系統整合了物理治療與營養學建議。請點擊下方按鈕啟動即時 AI 互動環境：</p>
            <a href="https://exercise-project-baihanlin.streamlit.app/" class="btn-streamlit" target="_blank">點此啟動 Streamlit 實體系統</a>
        </div>

        <div class="st-card">
            <h3>📅 開發日誌 (Update)</h3>
            <p><b>2026/04/09：</b> 完成 GitHub Pages 門面建置，導入混合式架構展示。</p>
        </div>

        <div class="st-card" style="background-color: #f8f9fb; border: none;">
            <p>💡 <b>資工系小提醒：</b> 此網頁為靜態展示區，核心運算請點擊紅色的啟動按鈕跳轉至 Streamlit 伺服器。</p>
        </div>
    </div>

</body>
</html>
